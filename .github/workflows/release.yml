name: Android Release

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Extract Version Name
        id: get_version
        run: |
          VERSION=$(grep "versionName =" app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          echo "VERSION_NAME=v$VERSION" >> $GITHUB_OUTPUT

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Tag name must be unique per release
          tag_name: "${{ steps.get_version.outputs.VERSION_NAME }}-${{ github.run_number }}"
          name: "${{ steps.get_version.outputs.VERSION_NAME }}"
          files: |
            app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
